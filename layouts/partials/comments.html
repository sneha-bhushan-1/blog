<section class="relative mt-80 mb-20 px-6">
    <div class="max-w-4xl mx-auto">
        <!-- Giscus Discussion container -->
        <div class="mb-12 mx-auto" style="max-width:820px;">
            <div id="giscus-container" class="giscus"></div>
        </div>
    </div>
</section>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const giscusContainer = document.getElementById("giscus-container");
        
        const getTheme = () => {
            const appearance = localStorage.getItem("appearance") || (document.documentElement.classList.contains("dark") ? "dark" : "light");
            console.log("Current appearance detected:", appearance);
            return appearance === "dark" ? "dark" : "light";
        };

        // --- Giscus Injection ---
        const giscusScript = document.createElement("script");
        giscusScript.src = "https://giscus.app/client.js";
        giscusScript.setAttribute("data-repo", "sneha-bhushan-1/blog");
        giscusScript.setAttribute("data-repo-id", "R_kgDOSEjt3Q");
        giscusScript.setAttribute("data-category", "Announcements");
        giscusScript.setAttribute("data-category-id", "DIC_kwDOSEjt3c4C7sQK");
        giscusScript.setAttribute("data-mapping", "pathname");
        giscusScript.setAttribute("data-strict", "0");
        giscusScript.setAttribute("data-reactions-enabled", "1");
        giscusScript.setAttribute("data-emit-metadata", "0");
        giscusScript.setAttribute("data-input-position", "bottom");
        giscusScript.setAttribute("data-theme", getTheme());
        giscusScript.setAttribute("data-lang", "en");
        giscusScript.crossOrigin = "anonymous";
        giscusScript.async = true;
        
        giscusContainer.appendChild(giscusScript);

        // --- Dynamic Theme Switching ---
        const updateGiscusTheme = () => {
            const theme = getTheme();
            console.log("Updating Giscus theme to:", theme);
            const iframe = document.querySelector("iframe.giscus-frame");
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage(
                    { giscus: { setConfig: { theme: theme } } },
                    "https://giscus.app"
                );
            }
        };

        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === "attributes" && mutation.attributeName === "class") {
                    updateGiscusTheme();
                }
            });
        });

        observer.observe(document.documentElement, {
            attributes: true,
            attributeFilter: ["class"]
        });

        // Ensure theme is correct once Giscus has loaded
        window.addEventListener("message", (event) => {
            if (event.origin !== "https://giscus.app") return;
            if (event.data.giscus && (event.data.giscus.resize || event.data.giscus.discussion)) {
                updateGiscusTheme();
            }
        });
    });
</script>
