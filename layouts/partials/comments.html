<section class="relative mt-80 mb-20 px-6">
    <div class="max-w-4xl mx-auto">
        <!-- Feedback: boxed container matching provided design -->
        <div class="mb-12 mx-auto" style="max-width:820px;">
            <div class="bg-neutral-900/90 border border-neutral-600/30 rounded-sm p-8 text-center">
                <h3 class="text-lg font-black text-white ai-style-change-7">Was this article helpful?</h3>
                <p class="text-sm text-neutral-400 mt-3">Your feedback helps me create better content for you.</p>

                <div class="mt-8 w-full flex justify-center">
                    <div class="flex items-center gap-6 sm:gap-12 md:gap-20 justify-center w-full max-w-[240px] ai-style-change-1">
                        <button id="like-btn" aria-pressed="false" class="group relative w-16 h-16 rounded-lg bg-neutral-800/60 border border-neutral-700 flex items-center justify-center transition-transform hover:scale-105">
                            <span class="text-2xl">🚀</span>
                        </button>
                        <button id="dislike-btn" aria-pressed="false" class="group relative w-16 h-16 rounded-lg bg-neutral-800/60 border border-neutral-700 flex items-center justify-center transition-transform hover:scale-105">
                            <span class="text-2xl">🤔</span>
                        </button>
                    </div>
                </div>

                <div class="mt-4 text-xs text-neutral-500 tracking-widest w-full">
                    <div class="mx-auto max-w-[240px] flex items-center gap-6 sm:gap-12 justify-center">
                        <span class="w-16 text-center text-neutral-400">Helpful!</span>
                        <span class="w-16 text-center text-neutral-400">Not Useful</span>
                    </div>
                </div>

                <div id="feedback-success" aria-hidden="true" class="mt-6 hidden">
                    <div class="inline-flex items-center gap-3 text-sm text-white">
                        <span class="text-2xl">✨</span>
                        <span class="font-bold">Awesome! Thanks for the feedback.</span>
                    </div>
                </div>
            </div>
        </div>

        

        <!-- Join Discussion box (screenshot match) -->
        <div class="mb-12 mx-auto" style="max-width:820px;">
            <div class="bg-neutral-900/90 border border-neutral-600/30 rounded-sm p-6">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-8 h-8 bg-neutral-800/70 rounded-full flex items-center justify-center text-neutral-900 dark:text-white">💬</div>
                    <h3 class="text-xl font-black text-neutral-900 dark:text-white">Join the discussion</h3>
                </div>

                <form id="comment-form" data-mask="{{ .Site.Params.contactEmail | base64Encode }}" method="POST" class="grid grid-cols-1 gap-4">
                    <input type="hidden" name="_subject" value="New Insight: {{ .Title }}">
                    <input type="hidden" name="_template" value="box">
                    <input type="hidden" name="_captcha" value="false">

                    <label class="text-[10px] font-black text-neutral-400 mt-4">Full name</label>
                    <input id="name" name="name" required placeholder="Alex Johnson" style="background-color: white; color: #1f2937;" class="w-full px-4 py-3 rounded-lg border border-neutral-300 placeholder:text-gray-400 outline-none focus:ring-2 focus:ring-blue-500">

                    <label class="text-[10px] font-black text-neutral-400">Email address</label>
                    <input id="email" name="email" type="email" required placeholder="alex@example.com" style="background-color: white; color: #1f2937;" class="w-full px-4 py-3 rounded-lg border border-neutral-300 placeholder:text-gray-400 outline-none focus:ring-2 focus:ring-blue-500">

                    <label class="text-[10px] font-black text-neutral-400">Your message</label>
                    <textarea id="message" name="message" rows="6" required placeholder="I found the section on Agentic AI particularly interesting..." style="background-color: white; color: #1f2937;" class="w-full px-4 py-4 rounded-lg border border-neutral-300 placeholder:text-gray-400 outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>

                    <button id="submit-btn" type="submit" class="w-full mt-2 bg-neutral-800 border-t border-neutral-700 py-3 text-white font-black tracking-wider rounded-b-sm">Send message →</button>
                </form>
            </div>
        </div>
    </div>
</section>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const getEmail = () => atob(document.getElementById('comment-form').dataset.mask);

        const sendFeedback = async (type) => {
            const email = getEmail();
            const url = `https://formsubmit.co/ajax/${email}`;
            const payload = {
                _subject: `New Insight: ${type} on {{ .Title }}`,
                message: `Feedback: ${type}\nArticle: {{ .Permalink }}`
            };

            try {
                const successEl = document.getElementById("feedback-success");
                // show success message
                successEl.classList.remove("hidden");

                const buttons = [document.getElementById("like-btn"), document.getElementById("dislike-btn")];
                buttons.forEach(btn => {
                    btn.style.opacity = "0.12";
                    btn.disabled = true;
                    btn.setAttribute('aria-pressed','true');
                });

                await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify(payload)
                });
            } catch (err) {
                console.error("Signal broadcast failed:", err);
            }
        };

        document.getElementById("like-btn").addEventListener("click", () => sendFeedback("Insightful (✨)"));
        document.getElementById("dislike-btn").addEventListener("click", () => sendFeedback("Needs Clarity (☁️)"));

        // Handle the main comment form via AJAX
        const form = document.getElementById('comment-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70');

            const data = new FormData(form);
            const email = getEmail();
            const actionUrl = `https://formsubmit.co/ajax/${email}`;

            try {
                const resp = await fetch(actionUrl, {
                    method: 'POST',
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (resp.ok) {
                    alert('Message sent successfully!');
                    form.reset();
                } else {
                    console.warn('Form send returned non-ok status', resp.status);
                }
            } catch (err) {
                console.error('Comment send failed', err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70');
            }
        });
    });
</script>
